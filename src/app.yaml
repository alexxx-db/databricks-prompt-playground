command:
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: SQL_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Shared/prompt-playground-evaluation"
  # Update these three values to match your Unity Catalog setup before deploying
  - name: PROMPT_CATALOG
    value: "your_catalog"
  - name: PROMPT_SCHEMA
    value: "prompts"
  - name: EVAL_SCHEMA
    value: "eval_data"
